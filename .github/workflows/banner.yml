name: Refresh banner

# The banner prints the current date and season in Melbourne, and picks its
# accent colour from the local time of day. Every three hours is enough to keep
# both honest across the four daylight phases and either side of a DST switch.
on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-banner
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate assets
        run: python3 scripts/gen_assets.py

      - name: Commit if the rendering actually changed
        run: |
          if git diff --quiet -- assets; then
            echo "no change; nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git commit -m "chore: refresh banner for Melbourne local time"
          git push
